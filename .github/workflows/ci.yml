name: CI Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-unix:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libncursesw5-dev zip unzip gettext python3-pip python3-weasyprint
          # Python packages for user-manual doc generation (English + all translations)
          pip3 install --break-system-packages markdown weasyprint || pip3 install markdown weasyprint || true

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # macOS provides clang++ with C++17 support, ncurses, zip, and unzip
          # out of the box. gettext provides xgettext/msgfmt for .po/.mo files.
          brew install gettext || true
          brew link --force gettext || true
          # Python packages for user-manual doc generation
          pip3 install --break-system-packages markdown weasyprint || pip3 install markdown weasyprint || true

      - name: Build
        run: make

      - name: Generate user manual docs (HTML/PDF/TXT)
        run: |
          chmod +x docs/generate_docs.sh
          (cd docs && ./generate_docs.sh all)

      #- name: Build and run tests
      #  run: make runtest

      - name: Extract version
        id: version
        run: |
          ver=$(grep 'PROGRAM_VERSION' src/program_info.h | sed -E 's/.*"(.*)".*/\1/' | tr -d '.')
          echo "ver=$ver" >> "$GITHUB_OUTPUT"

      - name: Prepare release directory
        run: |
          make nixReleaseArc RELEASE_ARC_FLAGS="--no-zip"

      - name: Upload release artifact
        uses: actions/upload-artifact@v5
        with:
          name: SlyMail-${{ steps.version.outputs.ver }}-${{ runner.os }}
          path: |
            FILE_ID.DIZ
            SlyMail_*/
          # SlyMail_*/docs/ — English + translated user manuals
          #   (cy da de el es fi fr ga ja nb pirate pl pt-BR ru sv zh-CN zh-TW)
          #   in HTML, PDF, and plain-text formats.
          # SlyMail_*/locale/ — compiled gettext .mo files for runtime UI
          #   translation into all 17 supported languages including Pirate.
          retention-days: 90

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release (x64)
        run: msbuild vs\SlyMail.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Extract version
        id: version
        shell: bash
        run: |
          ver=$(grep 'PROGRAM_VERSION' src/program_info.h | sed -E 's/.*"(.*)".*/\1/' | tr -d '.')
          echo "ver=$ver" >> "$GITHUB_OUTPUT"

      - name: Prepare Windows release directory
        shell: cmd
        run: makeWindowsReleaseArchive.bat --no-zip

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v5
        with:
          name: SlyMail-${{ steps.version.outputs.ver }}-Windows
          path: |
            FILE_ID.DIZ
            SlyMail_Windows/
          # SlyMail_Windows/docs/ contains the English user manual plus translated
          # variants for all supported languages (cy da de el es fi fr ga ja
          # nb pl pt-BR ru sv zh-CN zh-TW) in HTML, PDF, and plain-text formats.
          retention-days: 90
