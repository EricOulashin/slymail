name: CI Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-unix:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ make libncursesw5-dev zip unzip

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          # macOS provides clang++ with C++17 support, ncurses, zip, and unzip
          # out of the box. Install Python packages for doc generation.
          pip3 install --break-system-packages markdown weasyprint || pip3 install markdown weasyprint || true

      - name: Build
        run: make

      #- name: Build and run tests
      #  run: make runtest

      - name: Prepare macOS release directory
        if: matrix.os == 'macos-latest'
        run: |
          make nixReleaseArc RELEASE_ARC_FLAGS="--no-zip"

      - name: Upload macOS release artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: SlyMail-macOS-release
          path: SlyMail_Darwin/
          retention-days: 90

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release (x64)
        run: msbuild vs\SlyMail.sln /p:Configuration=Release /p:Platform=x64 /m

      - name: Prepare Windows release directory
        shell: cmd
        run: makeWindowsReleaseArchive.bat --no-zip

      - name: Upload Windows release artifact
        uses: actions/upload-artifact@v4
        with:
          name: SlyMail-Windows-release
          path: SlyMail_Windows/
          retention-days: 90
