; SlyMail Configuration File
; This file is automatically generated. Manual edits are preserved.

[General]

; Last directory browsed for QWK files
lastDirectory=.

; Last QWK file that was opened
lastQwkFile=

; Your name, used as the "From" field when writing replies
userName=

; Directory where REP reply packets are saved
; If empty, REP files are saved in the same directory as the QWK file
replyDir=

[MessageList]

; Use lightbar-style navigation in the message list
lightbarMode=true

; Show messages in reverse order (newest first)
reverseOrder=false

[Reader]

; Show kludge/control lines (e.g. @MSGID, @REPLY) in the message reader
showKludgeLines=false

; Show tear lines and origin lines in messages
showTearLine=true

; Show a scrollbar indicator on the right side of the message reader
useScrollbar=true

; Strip ANSI escape codes from message text
stripAnsi=false

; Attribute code toggles - enable/disable interpreting color/attribute
; codes from various BBS software packages. ANSI escape codes are always
; interpreted unless stripAnsi is enabled above.
; These settings affect both the message reader and the message editor.
attrSynchronet=true
attrWWIV=true
attrCelerity=true
attrRenegade=true
attrPCBoard=true

[Themes]

; Color theme file for the editor in Ice mode
; Theme files are located in the config/ directory
iceThemeFile=

; Color theme file for the editor in DCT mode
dctThemeFile=

[Editor]

; Editor style for writing messages: Ice, Dct, or Random
; Ice = IceEdit/QuikEdit style, Dct = DCT Edit style
; Random = randomly choose Ice or Dct each time the editor opens
editorStyle=Ice

; Default text entry mode: true=insert, false=overwrite
insertMode=true

; Whether to word-wrap quoted lines to the terminal width
wrapQuoteLines=true

; Maximum width for quote lines (in characters)
quoteLineWidth=76

; Prefix to prepend to quoted lines (e.g. "> ")
quotePrefix= > 

; Enable tagline insertion when saving a message
; When enabled, prompts to select or randomly choose a tagline from
; tagline_files/taglines.txt, which is appended to the message with "..." prefix
taglines=false

; Prompt the user to run the spell checker when saving a message
promptSpellCheck=true

; Comma-separated list of dictionary filenames for spell checking
; Dictionary files are located in the dictionary_files/ directory
spellDictionaries=dictionary_en-US-supplemental.txt,dictionary_en.txt

; Prepend the author's initials to quote line prefixes when replying
; e.g. if replying to Mike Powell, quote prefix becomes "MP> "
quoteWithInitials=true

; When quoting with author's initials, add a leading space
; e.g. " MP> " instead of "MP> "
indentQuoteInitials=true

; Strip leading whitespace from lines when quoting a message
trimQuoteSpaces=false
